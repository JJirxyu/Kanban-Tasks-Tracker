<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Kanban Tasks Tracker</title>
    <!-- ใช้ Tailwind CSS เพื่อความสวยงามและประหยัดเวลา -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen text-gray-800">

    <div class="container mx-auto px-4 py-8">
        <!-- HEADER & SUMMARY (ข้อ 1.6 ฟังก์ชันเฉพาะสรุปผล) -->
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-4">📋 Simple Kanban Tasks Tracker</h1>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4" id="summary-container">
                <div class="bg-white p-4 rounded-lg shadow-sm border-l-4 border-blue-500">
                    <p class="text-sm text-gray-500 uppercase">งานทั้งหมด</p>
                    <p class="text-2xl font-bold" id="total-tasks">0</p>
                </div>
                <div class="bg-white p-4 rounded-lg shadow-sm border-l-4 border-yellow-500">
                    <p class="text-sm text-gray-500 uppercase">กำลังทำ</p>
                    <p class="text-2xl font-bold" id="doing-tasks">0</p>
                </div>
                <div class="bg-white p-4 rounded-lg shadow-sm border-l-4 border-green-500">
                    <p class="text-sm text-gray-500 uppercase">เสร็จสิ้น</p>
                    <p class="text-2xl font-bold" id="done-tasks">0</p>
                </div>
                <div class="bg-white p-4 rounded-lg shadow-sm border-l-4 border-purple-500">
                    <p class="text-sm text-gray-500 uppercase">ความคืบหน้า</p>
                    <p class="text-2xl font-bold" id="completion-rate">0%</p>
                </div>
            </div>
        </header>

        <!-- ACTION BAR (ข้อ 1.1 เพิ่มข้อมูล / ข้อ 1.5 ค้นหาและกรอง) -->
        <div class="bg-white p-4 rounded-lg shadow-sm mb-8 flex flex-col md:flex-row gap-4 justify-between items-center">
            <div class="flex flex-1 w-full gap-2">
                <input type="text" id="search-input" placeholder="ค้นหางาน..." class="border rounded px-3 py-2 w-full max-w-xs focus:outline-none focus:ring-2 focus:ring-blue-500">
                <select id="filter-priority" class="border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">ความสำคัญทั้งหมด</option>
                    <option value="low">ต่ำ (Low)</option>
                    <option value="medium">กลาง (Medium)</option>
                    <option value="high">สูง (High)</option>
                </select>
                <button onclick="fetchTasks()" class="bg-gray-200 px-4 py-2 rounded hover:bg-gray-300">กรอง</button>
            </div>
            <button onclick="openAddModal()" class="bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700 w-full md:w-auto font-medium">+ เพิ่มงานใหม่</button>
        </div>

        <!-- KANBAN BOARD (ข้อ 1.2 แสดงข้อมูลรูปแบบการ์ด) -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- คอลัมน์ TO DO -->
            <div class="bg-gray-200 p-4 rounded-xl min-h-[500px]">
                <h3 class="font-bold text-gray-700 mb-4 flex items-center justify-between">
                    <span>📌 ต้องทำ (To Do)</span>
                    <span id="count-todo" class="bg-gray-300 text-gray-800 text-xs px-2 py-1 rounded-full">0</span>
                </h3>
                <div id="col-todo" class="space-y-3"></div>
            </div>

            <!-- คอลัมน์ DOING -->
            <div class="bg-yellow-100 p-4 rounded-xl min-h-[500px]">
                <h3 class="font-bold text-yellow-800 mb-4 flex items-center justify-between">
                    <span>⚡ กำลังทำ (Doing)</span>
                    <span id="count-doing" class="bg-yellow-200 text-yellow-800 text-xs px-2 py-1 rounded-full">0</span>
                </h3>
                <div id="col-doing" class="space-y-3"></div>
            </div>

            <!-- คอลัมน์ DONE -->
            <div class="bg-green-100 p-4 rounded-xl min-h-[500px]">
                <h3 class="font-bold text-green-800 mb-4 flex items-center justify-between">
                    <span>✅ เสร็จแล้ว (Done)</span>
                    <span id="count-done" class="bg-green-200 text-green-800 text-xs px-2 py-1 rounded-full">0</span>
                </h3>
                <div id="col-done" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <!-- MODAL สำหรับ เพิ่ม/แก้ไข/ดูรายละเอียด (ข้อ 1.1, 1.3, 1.4) -->
    <div id="task-modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-lg max-w-md w-full p-6 shadow-xl">
            <h2 id="modal-title" class="text-xl font-bold mb-4">เพิ่มงานใหม่</h2>
            <input type="hidden" id="task-id">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">ชื่อวิกงาน *</label>
                    <input type="text" id="form-title" class="w-full border rounded p-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">รายละเอียด</label>
                    <textarea id="form-description" rows="3" class="w-full border rounded p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">ความสำคัญ</label>
                    <select id="form-priority" class="w-full border rounded p-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="low">ต่ำ (Low)</option>
                        <option value="medium">กลาง (Medium)</option>
                        <option value="high">สูง (High)</option>
                    </select>
                </div>
                <div id="status-group" class="hidden">
                    <label class="block text-sm font-medium mb-1">สถานะ</label>
                    <select id="form-status" class="w-full border rounded p-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="todo">ต้องทำ</option>
                        <option value="doing">กำลังทำ</option>
                        <option value="done">เสร็จแล้ว</option>
                    </select>
                </div>
            </div>
            <div class="mt-6 flex justify-end gap-2">
                <button onclick="closeModal()" class="px-4 py-2 border rounded text-gray-600 hover:bg-gray-50">ยกเลิก</button>
                <button onclick="saveTask()" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">บันทึก</button>
            </div>
        </div>
    </div>

    <!-- 🌐 JAVASCRIPT CONNECT TO BACKEND -->
    <script>
        const API_URL = 'http://localhost:5000/api';

        // เรียกทำงานตอนโหลดหน้าเว็บครั้งแรก
        document.addEventListener('DOMContentLoaded', () => {
            fetchTasks();
            fetchSummary();
        });

        // 1) ดึงข้อมูลมาแสดงผลและคัดกรอง (Read & Filter)
        async function fetchTasks() {
            const search = document.getElementById('search-input').value;
            const priority = document.getElementById('filter-priority').value;
            
            let url = `${API_URL}/tasks?`;
            if (search) url += `search=${encodeURIComponent(search)}&`;
            if (priority) url += `priority=${priority}`;

            try {
                const res = await fetch(url);
                const tasks = await res.json();
                
                // เคลียร์กระดานเก่า
                document.getElementById('col-todo').innerHTML = '';
                document.getElementById('col-doing').innerHTML = '';
                document.getElementById('col-done').innerHTML = '';

                let counts = { todo: 0, doing: 0, done: 0 };

                tasks.forEach(task => {
                    counts[task.status]++;
                    const card = createTaskCard(task);
                    document.getElementById(`col-${task.status}`).appendChild(card);
                });

                // อัปเดตตัวเลขหัวคอลัมน์
                document.getElementById('count-todo').innerText = counts.todo;
                document.getElementById('count-doing').innerText = counts.doing;
                document.getElementById('count-done').innerText = counts.done;

            } catch (err) {
                console.error("Error fetching tasks:", err);
            }
        }

        // ฟังก์ชันสร้าง UI การ์ดภารกิจ
        function createTaskCard(task) {
            const div = document.createElement('div');
            div.className = 'bg-white p-4 rounded-lg shadow-sm border border-gray-200 hover:shadow-md transition';
            
            const priorityColors = { low: 'bg-blue-100 text-blue-800', medium: 'bg-gray-100 text-gray-800', high: 'bg-red-100 text-red-800' };
            
            div.innerHTML = `
                <div class="flex justify-between items-start mb-2">
                    <span class="text-xs font-semibold px-2 py-0.5 rounded ${priorityColors[task.priority]}">${task.priority.toUpperCase()}</span>
                    <div class="flex gap-1">
                        <button onclick="openEditModal(${task.id})" class="text-xs text-blue-600 hover:underline">แก้ไข</button>
                        <button onclick="deleteTask(${task.id})" class="text-xs text-red-600 hover:underline ml-2">ลบ</button>
                    </div>
                </div>
                <h4 class="font-bold text-gray-900 mb-1 cursor-pointer hover:text-blue-600" onclick="viewDetail(${task.id})">${task.title}</h4>
                <p class="text-gray-600 text-sm line-clamp-2">${task.description || 'ไม่มีรายละเอียด'}</p>
            `;
            return div;
        }

        // 2) ดึงสรุปยอดรวม (Summary)
        async function fetchSummary() {
            try {
                const res = await fetch(`${API_URL}/summary`);
                const data = await res.json();
                document.getElementById('total-tasks').innerText = data.total;
                document.getElementById('doing-tasks').innerText = data.doing;
                document.getElementById('done-tasks').innerText = data.done;
                document.getElementById('completion-rate').innerText = `${data.completionRate}%`;
            } catch (err) {
                console.error("Error summary:", err);
            }
        }

        // Modal Controllers
        function openAddModal() {
            document.getElementById('modal-title').innerText = 'เพิ่มงานใหม่';
            document.getElementById('task-id').value = '';
            document.getElementById('form-title').value = '';
            document.getElementById('form-description').value = '';
            document.getElementById('form-priority').value = 'medium';
            document.getElementById('status-group').classList.add('hidden');
            document.getElementById('task-modal').classList.remove('hidden');
        }

        // 3) ดูรายละเอียดข้อมูล (Read Detail)
        async function viewDetail(id) {
            try {
                const res = await fetch(`${API_URL}/tasks/${id}`);
                const task = await res.json();
                alert(`📌 รายละเอียดงาน:\n\nหัวข้อ: ${task.title}\nความสำคัญ: ${task.priority.toUpperCase()}\nสถานะ: ${task.status.toUpperCase()}\nรายละเอียด: ${task.description || '-'}`);
            } catch (err) {
                alert("ไม่สามารถดึงรายละเอียดได้");
            }
        }

        // 4) แก้ไขข้อมูล (เปิด Modal เพื่อเตรียมแก้ไข)
        async function openEditModal(id) {
            try {
                const res = await fetch(`${API_URL}/tasks/${id}`);
                const task = await res.json();
                
                document.getElementById('modal-title').innerText = 'แก้ไขข้อมูลงาน';
                document.getElementById('task-id').value = task.id;
                document.getElementById('form-title').value = task.title;
                document.getElementById('form-description').value = task.description;
                document.getElementById('form-priority').value = task.priority;
                document.getElementById('form-status').value = task.status;
                
                document.getElementById('status-group').classList.remove('hidden');
                document.getElementById('task-modal').classList.remove('hidden');
            } catch (err) {
                console.error(err);
            }
        }

        function closeModal() {
            document.getElementById('task-modal').classList.add('hidden');
        }

        // 5) ฟังก์ชันบันทึกข้อมูล (ทั้ง Add และ Edit)
        async function saveTask() {
            const id = document.getElementById('task-id').value;
            const title = document.getElementById('form-title').value;
            const description = document.getElementById('form-description').value;
            const priority = document.getElementById('form-priority').value;
            const status = document.getElementById('form-status').value;

            if (!title) return alert("กรุณากรอกชื่อวิกงาน");

            const payload = { title, description, priority, status };
            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/tasks/${id}` : `${API_URL}/tasks`;

            try {
                await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                closeModal();
                fetchTasks();
                fetchSummary();
            } catch (err) {
                console.error(err);
            }
        }

        // 6) ลบข้อมูลพร้อมข้อความยืนยันก่อนลบ (Delete with Confirmation)
        async function deleteTask(id) {
            if (confirm("⚠️ คุณแน่ใจหรือไม่ว่าต้องการลบงานนี้? (ข้อมูลจะถูกลบถาวร)")) {
                try {
                    await fetch(`${API_URL}/tasks/${id}`, { method: 'DELETE' });
                    fetchTasks();
                    fetchSummary();
                } catch (err) {
                    console.error(err);
                }
            }
        }
    </script>
</body>
</html>
